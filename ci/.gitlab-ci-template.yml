# GitLab CI Template for Quartermaster Dependency Updates
#
# Quartermaster scans repositories for outdated dependencies and creates
# merge requests / issues with intelligent grouping and fallback strategies.
#
# Repository: https://github.com/oddship/quartermaster
#
# Required CI/CD Variables:
#   QUARTERMASTER_GITLAB_TOKEN: GitLab access token with 'api' scope + developer role
#     - Needs: create branches, push commits, create MRs/issues
#     - Create at: Settings -> Access Tokens
#
#   LLM API Key (one of):
#     - ANTHROPIC_API_KEY: Anthropic API key (for Claude models)
#     - GEMINI_API_KEY: Google API key (for Gemini models)
#     - OPENAI_API_KEY: OpenAI API key (for GPT models)
#     - For Bedrock: No API key needed (uses IAM role on runner)
#
# Optional Variables:
#   QUARTERMASTER_MODEL: LLM model (default: anthropic/claude-sonnet-4-20250514)
#   QUARTERMASTER_ARGS: Additional CLI arguments (default: "")
#   QUARTERMASTER_VERSION: Docker image version (default: latest)
#   QUARTERMASTER_CONFIDENCE: Minimum confidence threshold 0-1 (default: 0.5)
#   QUARTERMASTER_DRY_RUN: Set to "false" to actually create MRs (default: "true")
#
# Usage:
#
#   include:
#     - project: 'commons/gitlab-templates'
#       ref: master
#       file: '/quartermaster/.gitlab-ci-template.yml'
#
#   quartermaster-deps:
#     extends: .quartermaster-deps
#
# Schedule: Create a pipeline schedule at Settings -> CI/CD -> Schedules
#   Recommended: Weekly, Sunday 2:00 UTC
#   Set variable: QUARTERMASTER_SCHEDULED=true
#
# To enable live execution (actually create MRs/issues):
#   quartermaster-deps:
#     extends: .quartermaster-deps
#     variables:
#       QUARTERMASTER_DRY_RUN: "false"

variables:
  QUARTERMASTER_VERSION: "latest"
  QUARTERMASTER_MODEL: "anthropic/claude-sonnet-4-20250514"
  QUARTERMASTER_ARGS: ""
  QUARTERMASTER_CONFIDENCE: "0.5"
  QUARTERMASTER_DRY_RUN: "true"

.quartermaster-deps:
  stage: test
  image:
    name: ghcr.io/oddship/quartermaster:${QUARTERMASTER_VERSION}
    entrypoint: [""]

  # Only run on schedule or manual trigger
  rules:
    - if: '$QUARTERMASTER_SCHEDULED == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never

  script:
    - git config --global --add safe.directory $CI_PROJECT_DIR

    # Set up glab for GitLab API access
    - export GITLAB_HOST=$CI_SERVER_URL
    - export GLAB_CONFIG_DIR=${CI_PROJECT_DIR}/.glab-ci && mkdir -p $GLAB_CONFIG_DIR
    - export GLAB_SEND_TELEMETRY=false
    - export GITLAB_TOKEN="${QUARTERMASTER_GITLAB_TOKEN:-$GITLAB_TOKEN}"
    - glab auth login --hostname $CI_SERVER_HOST --api-protocol $CI_SERVER_PROTOCOL --token $GITLAB_TOKEN

    # For Bedrock models, fetch AWS credentials from instance metadata (IMDS)
    - |
      if echo "$QUARTERMASTER_MODEL" | grep -q "^bedrock/" && [ -z "$AWS_ACCESS_KEY_ID" ]; then
        IMDS_TOKEN=$(curl -sf -X PUT "http://169.254.169.254/latest/api/token" \
          -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null || true)
        if [ -n "$IMDS_TOKEN" ]; then
          ROLE_NAME=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
            "http://169.254.169.254/latest/meta-data/iam/security-credentials/" 2>/dev/null || true)
          if [ -n "$ROLE_NAME" ]; then
            CREDS=$(curl -sf -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
              "http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE_NAME")
            export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .AccessKeyId)
            export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey)
            export AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .Token)
            echo "Fetched AWS credentials from instance metadata (role: $ROLE_NAME)"
          fi
        fi
      fi

    # Determine execution mode
    - |
      if [ "$QUARTERMASTER_DRY_RUN" = "false" ]; then
        EXEC_FLAG="--execute"
        echo "Mode: LIVE (will create MRs/issues)"
      else
        EXEC_FLAG=""
        echo "Mode: DRY RUN (no changes will be made)"
      fi

    # Run the full pipeline: scan + validate + execute
    - |
      echo "Scanning ${CI_PROJECT_URL} with model ${QUARTERMASTER_MODEL}"
      bun run /app/dist/cli.js run \
        --repo-dir "$CI_PROJECT_DIR" \
        --model "$QUARTERMASTER_MODEL" \
        --platform gitlab \
        --project-url "$CI_PROJECT_URL" \
        --default-branch "$CI_DEFAULT_BRANCH" \
        --confidence-threshold "$QUARTERMASTER_CONFIDENCE" \
        --output "/tmp/quartermaster/plan.json" \
        $EXEC_FLAG \
        $QUARTERMASTER_ARGS

  artifacts:
    paths:
      - /tmp/quartermaster/plan.json
    when: always
    expire_in: 30 days

  allow_failure: true
  timeout: 15m
